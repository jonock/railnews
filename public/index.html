<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Railnews - Skandinavien-Briefing</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="public-page">
    <header class="topbar public-hero">
      <div class="hero-grid">
        <div class="hero-center">
          <img class="hero-image" src="/images/header.png" alt="Zwei Personen lesen gemeinsam eine Zeitung">
          <p class="hero-region">Skandinavien auf der Schiene</p>
          <h1>Railnews</h1>
          <p class="hero-copy">Tägliche Bahnmeldungen aus skandinavischen Quellen, kompakt zusammengeführt.</p>
          <a class="hero-cta" href="#briefing">Aktuelles Briefing</a>
        </div>
      </div>
    </header>

    <main class="public-layout">
      <section class="briefings" id="briefing">
        <div class="section-head">
          <div>
            <p class="section-kicker">Briefing</p>
            <h2>Aktuelle Lage</h2>
          </div>
        </div>
        <div id="briefingList" class="stack"></div>
      </section>

      <section class="articles">
        <div class="section-head">
          <div>
            <p class="section-kicker">Quellenlage</p>
            <h2>Gefundene Meldungen</h2>
          </div>
        </div>
        <div id="articleList" class="article-grid"></div>
      </section>
    </main>

    <footer class="public-footer">
      <a class="admin-link" href="/admin/">Backend</a>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
