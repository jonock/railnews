<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Railnews - Skandinavien-Briefing</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Tägliches Eisenbahnbriefing</p>
        <h1>Railnews</h1>
        <p class="hero-copy">Aktuelle Meldungen zur Eisenbahnbranche in Skandinavien, kuratiert aus ausgewählten Quellen.</p>
      </div>
      <a class="admin-link" href="/admin/">Backend</a>
    </header>

    <main class="public-layout">
      <section class="briefings">
        <div class="section-head">
          <h2>Aktuelle Briefings</h2>
          <span id="status">Wird geladen</span>
        </div>
        <div id="briefingList" class="stack"></div>
      </section>

      <section class="articles">
        <h2>Gefundene Meldungen</h2>
        <div id="articleList" class="article-grid"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
