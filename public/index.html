<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Railnews</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Daily Scandinavian railway intelligence</p>
        <h1>Railnews</h1>
      </div>
      <button id="runBriefing" type="button">Run briefing</button>
    </header>

    <main class="layout">
      <section class="briefings">
        <div class="section-head">
          <h2>Briefings</h2>
          <span id="status">Loading</span>
        </div>
        <div id="briefingList" class="stack"></div>
      </section>

      <aside class="settings">
        <section>
          <h2>Sources</h2>
          <form id="sourceForm" class="form">
            <input name="name" placeholder="Source name" required>
            <input name="url" type="url" placeholder="https://example.com/news" required>
            <button type="submit">Add source</button>
          </form>
          <div id="sourceList" class="mini-list"></div>
        </section>

        <section>
          <h2>Research topics</h2>
          <form id="topicForm" class="form">
            <input name="label" placeholder="Topic label" required>
            <textarea name="keywords" placeholder="Comma-separated keywords" required></textarea>
            <button type="submit">Add topic</button>
          </form>
          <div id="topicList" class="mini-list"></div>
        </section>
      </aside>

      <section class="articles">
        <h2>Latest matches</h2>
        <div id="articleList" class="article-grid"></div>
      </section>
    </main>

    <dialog id="tokenDialog">
      <form method="dialog" class="dialog-card">
        <h2>Admin token</h2>
        <input id="tokenInput" type="password" placeholder="ADMIN_TOKEN">
        <menu>
          <button value="cancel">Cancel</button>
          <button id="saveToken" value="default">Save</button>
        </menu>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
